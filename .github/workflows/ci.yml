# .github/workflows/ci.yml
# --------------------------
# GitHub Actions CI Pipeline
#
# Triggers on every push to main/develop and on every pull request.
# Jobs:
#   1. lint   – code quality checks (flake8)
#   2. test   – run pytest with coverage
#   3. build  – build Docker image to verify it compiles correctly
#
# MLOps role: Automates quality gates.  Bad code never reaches main branch.
# Data Eng   : Schema / data pipeline tests run here too.
# ML role    : Preprocessing and feature engineering unit tests run here.

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # --------------------------------------------------------------------------
  # Job 1 – Lint
  # --------------------------------------------------------------------------
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8
        # E501: max line length – relaxed to 120 chars for readability
        # W503: line break before binary operator – conflicts with Black
        run: |
          flake8 src/ api/ tests/ \
            --max-line-length=120 \
            --extend-ignore=W503,E203 \
            --count --statistics

  # --------------------------------------------------------------------------
  # Job 2 – Tests
  # --------------------------------------------------------------------------
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint   # Only run tests if linting passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --verbose \
            --tb=short \
            --cov=src \
            --cov=api \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  # --------------------------------------------------------------------------
  # Job 3 – Docker build (smoke test)
  # --------------------------------------------------------------------------
  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: test   # Only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag churn-api:ci-${{ github.sha }} \
            --file Dockerfile \
            .

      - name: Verify container starts
        run: |
          docker run --rm -d \
            --name churn-api-smoke \
            -p 8000:8000 \
            churn-api:ci-${{ github.sha }}
          sleep 5
          curl --fail http://localhost:8000/health || (docker logs churn-api-smoke && exit 1)
          docker stop churn-api-smoke
